<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>海洋探险·有理数大挑战 | 卡通风格答题游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 避免答题时拖动文字，不影响选择 */
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #9ad9f5 0%, #2b7abf 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Comic Neue', 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', 'Poppins', cursive, sans-serif;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 海洋气泡动画 */
        .bubble {
            position: fixed;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            box-shadow: inset -3px -3px 5px rgba(0,0,0,0.1), 0 0 15px rgba(255,255,200,0.6);
            animation: floatUp 8s infinite ease-in;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0.5);
                opacity: 0;
            }
            20% {
                opacity: 0.6;
            }
            80% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-20vh) scale(1.2);
                opacity: 0;
            }
        }

        /* 游戏主面板 */
        .game-container {
            width: 100%;
            max-width: 850px;
            background: rgba(255, 251, 220, 0.9);
            border-radius: 70px 70px 80px 80px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3), inset 0 1px 5px rgba(255,255,200,0.8);
            backdrop-filter: blur(2px);
            overflow: hidden;
            z-index: 10;
            transition: all 0.2s ease;
            border: 3px solid #ffdf8c;
        }

        /* 海洋生物头部栏 */
        .game-header {
            background: #ffc48a;
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border-bottom: 5px solid #f7a15c;
            background-image: radial-gradient(circle at 10% 30%, rgba(255,215,150,0.6) 2%, transparent 2.5%);
            background-size: 20px 20px;
        }

        .score-box {
            background: #2d3e50;
            padding: 8px 20px;
            border-radius: 50px;
            color: #ffefb9;
            font-weight: bold;
            font-size: 1.5rem;
            box-shadow: inset 0 -2px 0 #1a2a38, 0 5px 10px rgba(0,0,0,0.2);
            font-family: monospace;
        }

        .score-box span {
            font-size: 1.8rem;
            color: #f9d56e;
            margin-right: 5px;
        }

        .starfish {
            font-size: 2rem;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2));
        }

        .level-badge {
            background: #57b5a7;
            padding: 5px 18px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 0 #2f7a6b;
        }

        /* 关卡选择区 */
        .level-selector {
            display: flex;
            justify-content: center;
            gap: 18px;
            background: #ffe3b5;
            padding: 12px 20px;
            border-bottom: 3px dashed #f7b05e;
        }

        .level-btn {
            background: #fff3e0;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 8px 25px;
            border-radius: 60px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
            box-shadow: 0 5px 0 #c9aa7b;
            color: #5a3e1b;
        }

        .level-btn.active {
            background: #ffaa5e;
            color: white;
            box-shadow: 0 2px 0 #c96f1e;
            transform: translateY(2px);
        }

        .level-btn:hover {
            background: #ffc48a;
            transform: scale(0.97);
        }

        /* 题目区域 */
        .quiz-area {
            padding: 25px 30px 20px;
            min-height: 380px;
        }

        .question-text {
            background: #fdf8ec;
            padding: 20px 20px;
            border-radius: 55px;
            font-size: 1.4rem;
            font-weight: bold;
            text-align: center;
            color: #1f4f6e;
            box-shadow: inset 0 1px 8px rgba(0,0,0,0.05), 0 8px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            border: 2px solid #ffe0a3;
            word-break: break-word;
        }

        .options-area {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 35px;
        }

        .option {
            background: #eef3fc;
            padding: 14px 20px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 18px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid #c0e0ff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .option:hover {
            background: #ffe2b5;
            transform: scale(0.99);
            border-color: #ffb347;
        }

        .prefix {
            background: #ffc107;
            width: 38px;
            height: 38px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: bold;
            font-size: 1.3rem;
            color: #2c3e2f;
            box-shadow: inset 0 -1px 0 #b97f10, 0 2px 5px rgba(0,0,0,0.1);
        }

        .feedback {
            text-align: center;
            font-size: 1.2rem;
            padding: 12px;
            border-radius: 40px;
            margin-top: 5px;
            font-weight: bold;
        }

        .next-btn {
            background: #6bc46d;
            border: none;
            width: 80%;
            margin: 0 auto 15px;
            display: block;
            padding: 14px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            color: white;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 6px 0 #3b6e3e;
            transition: 0.07s linear;
        }

        .next-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #3b6e3e;
        }

        .reset-btn {
            background: #ff8a7a;
            box-shadow: 0 6px 0 #b14538;
            width: 40%;
            margin-bottom: 15px;
        }

        .game-footer {
            background: #f8e1b0;
            padding: 10px;
            text-align: center;
            font-size: 0.8rem;
            color: #aa7b4c;
            border-top: 2px solid #ffcf8e;
        }

        @media (max-width: 550px) {
            .question-text { font-size: 1.1rem; }
            .option { font-size: 0.9rem; padding: 10px 14px; }
            .prefix { width: 30px; height: 30px; font-size: 1rem; }
            .level-btn { padding: 5px 15px; font-size: 1rem; }
        }

        .correct-feedback {
            background: #c8e6d9;
            color: #1f6e43;
            border-left: 8px solid #2ecc71;
        }
        .wrong-feedback {
            background: #ffe0e0;
            color: #b33;
            border-left: 8px solid #e67e22;
        }
        button {
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-header">
        <div class="starfish">🐙🐚 海洋数学岛 🐠🐟</div>
        <div class="score-box">⭐ 积分 <span id="scoreValue">0</span></div>
        <div class="level-badge">🌊 有理数探险</div>
    </div>
    <div class="level-selector">
        <button class="level-btn" data-level="basic">🐚 基础海湾</button>
        <button class="level-btn" data-level="medium">🌊 珊瑚礁 (中等)</button>
        <button class="level-btn" data-level="hard">🐋 深海旋涡 (难度)</button>
    </div>
    <div class="quiz-area">
        <div class="question-text" id="questionText">点击关卡，开始挑战吧！</div>
        <div class="options-area" id="optionsArea"></div>
        <div class="feedback" id="feedbackMsg"></div>
        <button class="next-btn" id="nextBtn">🐬 下一题 🐬</button>
        <button class="next-btn reset-btn" id="resetGameBtn">🔄 重置积分 & 重玩</button>
    </div>
    <div class="game-footer">
        🧜‍♀️ 每答对一题 +10 分 | 完成整个关卡自动结算额外奖励！
    </div>
</div>

<script>
    // ----------------------------- 题库：有理数分类、数轴、绝对值、相反数、比较 -----------------------------
    // 基础题 (5题)
    const basicQuestions = [
        {
            text: "🐚 把 -5, 0, 3.2, -1/2 分类：下列哪个是负有理数？",
            options: ["3.2", "0", "-5", "1/2"],
            correct: 2,
            explanation: "负有理数是小于0的有理数，-5符合。"
        },
        {
            text: "🐚 -7 的相反数是？",
            options: ["7", "-7", "1/7", "0"],
            correct: 0,
            explanation: "相反数只有符号不同，-7的相反数是7。"
        },
        {
            text: "🐚 数轴上，-3 和 2 之间的距离是多少？",
            options: ["1", "5", "3", "2"],
            correct: 1,
            explanation: "距离 = |2 - (-3)| = 5。"
        },
        {
            text: "🐚 比较大小：-|-4| 与 -(-4)，正确的是？",
            options: ["-|-4| > -(-4)", "-|-4| < -(-4)", "相等", "无法比较"],
            correct: 1,
            explanation: "-|-4| = -4， -(-4)=4，所以 -4 < 4。"
        },
        {
            text: "🐚 若 |x| = 2.5，则 x 可能是？",
            options: ["2.5", "-2.5", "以上都是", "0"],
            correct: 2,
            explanation: "绝对值等于2.5的数是 ±2.5。"
        }
    ];

    // 中等题 (5题)
    const mediumQuestions = [
        {
            text: "🌊 点A表示-2，点B与A相距3个单位，则点B表示的数是？",
            options: ["1", "-5", "1 或 -5", "3"],
            correct: 2,
            explanation: "可能向右：-2+3=1；向左：-2-3=-5。"
        },
        {
            text: "🌊 有理数 a, b 在数轴位置：a<0, b>0 且 |a| > |b|，那么 a+b 的符号？",
            options: ["正", "负", "0", "无法确定"],
            correct: 1,
            explanation: "负数绝对值更大，和仍为负。"
        },
        {
            text: "🌊 下列哪个数最小？ -(-3), -| -2 |, 0, -1/2",
            options: ["-(-3)", "-| -2 |", "0", "-1/2"],
            correct: 1,
            explanation: "-(-3)=3, -|-2| = -2, 0, -0.5 最小的是 -2。"
        },
        {
            text: "🌊 若 a 与 b 互为相反数，c 是绝对值最小的有理数，则 a+b+c = ?",
            options: ["1", "0", "-1", "c"],
            correct: 1,
            explanation: "a+b=0，c=0，总和0。"
        },
        {
            text: "🌊 温度从 -5℃ 上升到 3℃，上升了多少度？",
            options: ["-2℃", "2℃", "8℃", "-8℃"],
            correct: 2,
            explanation: "3 - (-5) = 8℃。"
        }
    ];

    // 难度题 (5题)
    const hardQuestions = [
        {
            text: "🐋 已知 |x| = 3, |y| = 5，且 x > y，则 x+y 的值是？",
            options: ["-2 或 -8", "2 或 8", "-2 或 8", "2 或 -8"],
            correct: 0,
            explanation: "x=±3, y=±5, x>y ⇒ 若x=3,y=-5 → -2；若x=-3,y=-5 → -8。"
        },
        {
            text: "🐋 数轴点P从-2出发，向右5到Q，再向左7到R，则R到原点的距离是？",
            options: ["4", "3", "2", "5"],
            correct: 0,
            explanation: "Q=3,R=-4, |R|=4。"
        },
        {
            text: "🐋 若 |a-2| + |b+3| = 0，则 a+b 的值为？",
            options: ["-1", "1", "5", "-5"],
            correct: 0,
            explanation: "非负性和为0，a=2,b=-3, a+b=-1。"
        },
        {
            text: "🐋 比较大小：-2/3 与 -3/4 哪个大？",
            options: ["-2/3", "-3/4", "一样大", "不能比较"],
            correct: 0,
            explanation: "负数比较绝对值，2/3≈0.666, 3/4=0.75, 绝对值小的反而大，所以-2/3 > -3/4。"
        },
        {
            text: "🐋 若 a 为有理数，则 |a| + a 一定是？",
            options: ["正数", "非负数", "负数", "0"],
            correct: 1,
            explanation: "当a≥0,=2a≥0; a<0时=0，结果≥0。"
        }
    ];

    // 所有关卡
    const levelMap = {
        basic: { name: "基础海湾", questions: basicQuestions, bonus: 20 },
        medium: { name: "珊瑚礁", questions: mediumQuestions, bonus: 30 },
        hard: { name: "深海旋涡", questions: hardQuestions, bonus: 50 }
    };

    // 游戏全局状态
    let currentLevel = "basic";        // basic / medium / hard
    let currentQuestionIndex = 0;
    let levelQuestions = [...basicQuestions]; // 当前关卡题目副本
    let score = 0;
    let answered = false;               // 当前题目是否已作答
    let selectedOptionIdx = null;
    let levelCompletedFlag = false;     // 防止重复领取bonus
    let currentQuestionsSnapshot = [];   // 存储当前关卡题目列表

    // DOM 元素
    const scoreSpan = document.getElementById("scoreValue");
    const questionTextDiv = document.getElementById("questionText");
    const optionsArea = document.getElementById("optionsArea");
    const feedbackDiv = document.getElementById("feedbackMsg");
    const nextBtn = document.getElementById("nextBtn");
    const resetBtn = document.getElementById("resetGameBtn");
    const levelBtns = document.querySelectorAll(".level-btn");

    // 更新积分显示
    function updateScoreUI() {
        scoreSpan.innerText = score;
    }

    // 保存积分到localStorage可不要，但保留纯净
    // 显示当前题目
    function renderCurrentQuestion() {
        if (!levelQuestions.length || currentQuestionIndex >= levelQuestions.length) {
            // 关卡已完成
            if (!levelCompletedFlag) {
                // 发放完成奖励
                const bonus = levelMap[currentLevel].bonus;
                score += bonus;
                updateScoreUI();
                levelCompletedFlag = true;
                feedbackDiv.innerHTML = `🎉✨ 恭喜完成${levelMap[currentLevel].name}！获得额外 ${bonus} 分！ ✨🎉`;
                feedbackDiv.className = "feedback correct-feedback";
                questionTextDiv.innerText = `🎊 太棒啦！你征服了${levelMap[currentLevel].name}！ 🎊\n点击重置积分或切换关卡继续挑战！`;
                optionsArea.innerHTML = "";
                nextBtn.disabled = false; // 但可保留按钮做重置提示
                return;
            }
            // 已完成，显示完成界面
            questionTextDiv.innerText = `🏆 已完成 ${levelMap[currentLevel].name} 🏆  积分: ${score}`;
            optionsArea.innerHTML = "";
            return;
        }

        const q = levelQuestions[currentQuestionIndex];
        questionTextDiv.innerText = q.text;
        // 生成选项按钮
        let optionsHtml = "";
        const letters = ["🐟 A", "🐠 B", "🐙 C", "🐡 D"];
        q.options.forEach((opt, idx) => {
            const disabledAttr = answered ? "disabled" : "";
            const selectedClass = (selectedOptionIdx === idx && answered) ? "selected-highlight" : "";
            optionsHtml += `
                <div class="option" data-opt-index="${idx}" style="${answered ? 'pointer-events: none; opacity:0.8' : ''}">
                    <div class="prefix">${letters[idx]}</div>
                    <div>${opt}</div>
                </div>
            `;
        });
        optionsArea.innerHTML = optionsHtml;
        if (!answered) {
            // 绑定事件
            document.querySelectorAll(".option").forEach(optDiv => {
                optDiv.addEventListener("click", (e) => {
                    if (answered) return;
                    const idx = parseInt(optDiv.dataset.optIndex);
                    handleAnswer(idx);
                });
            });
        } else {
            // 显示已经选择的反馈信息（保留之前的反馈文字）
        }
        // 反馈区显示之前信息不重置
    }

    // 处理作答
    function handleAnswer(selectedIdx) {
        if (answered) return;
        const q = levelQuestions[currentQuestionIndex];
        const isCorrect = (selectedIdx === q.correct);
        selectedOptionIdx = selectedIdx;
        if (isCorrect) {
            // 加10分
            score += 10;
            updateScoreUI();
            feedbackDiv.innerHTML = `✅ 漂亮！ +10分！ ${q.explanation || ""}`;
            feedbackDiv.className = "feedback correct-feedback";
        } else {
            feedbackDiv.innerHTML = `❌ 噢不… 正确答案是 ${q.options[q.correct]}。 ${q.explanation || "再试试下一题吧！"}`;
            feedbackDiv.className = "feedback wrong-feedback";
        }
        answered = true;
        // 重新渲染题目，让选项不可选，并且高亮正确的答案（美观上简单显示正确选项提示）
        renderCurrentQuestion(); // 重绘时会禁用点击，但也可显示正确样式
        // 额外手动将正确选项标绿展示
        const allOptionsDiv = document.querySelectorAll(".option");
        if (allOptionsDiv.length) {
            allOptionsDiv.forEach((div, idx) => {
                if (idx === q.correct) {
                    div.style.backgroundColor = "#c8f0d1";
                    div.style.border = "2px solid #2ecc71";
                } else if (idx === selectedIdx && !isCorrect) {
                    div.style.backgroundColor = "#ffe0e0";
                    div.style.border = "2px solid #e67e22";
                }
            });
        }
    }

    // 加载下一题
    function loadNextQuestion() {
        if (!levelCompletedFlag && currentQuestionIndex + 1 < levelQuestions.length) {
            // 正常下一题
            currentQuestionIndex++;
            answered = false;
            selectedOptionIdx = null;
            feedbackDiv.innerHTML = "";
            feedbackDiv.className = "feedback";
            renderCurrentQuestion();
        } else if (!levelCompletedFlag && currentQuestionIndex + 1 === levelQuestions.length) {
            // 这是最后一题，再点完成关卡
            // 标记完成即将触发完成关卡的判定
            currentQuestionIndex++; // 增加索引使得下一轮渲染完成界面
            answered = false;
            renderCurrentQuestion(); // 会触发完成关卡奖励
            // 按钮文案可稍微变化
            nextBtn.innerText = "🏁 完成探险 🏁";
        } else {
            // 已经完成关卡了，再点下一题提示切换关卡
            feedbackDiv.innerHTML = "🎈 当前关卡已完成！请选择其他海洋区域或重置积分继续冒险~";
            feedbackDiv.className = "feedback wrong-feedback";
        }
        // 如果关卡已完成，调整next按钮文本
        if (levelCompletedFlag || (currentQuestionIndex >= levelQuestions.length)) {
            nextBtn.innerText = "🐚 切换关卡 🐚";
        } else {
            nextBtn.innerText = "🐬 下一题 🐬";
        }
    }

    // 重置当前关卡状态（保留积分可选？重置积分则积分归零，并重新开始当前关卡的题目）
    function resetGame(keepScore = false) {
        if (!keepScore) {
            score = 0;
            updateScoreUI();
        }
        // 重置当前关卡索引
        currentQuestionIndex = 0;
        answered = false;
        selectedOptionIdx = null;
        levelCompletedFlag = false;
        // 重新加载当前关卡的题目副本（保证原始顺序）
        loadLevelQuestions(currentLevel);
        feedbackDiv.innerHTML = "";
        feedbackDiv.className = "feedback";
        renderCurrentQuestion();
        nextBtn.innerText = "🐬 下一题 🐬";
    }

    // 根据level加载题目列表副本
    function loadLevelQuestions(level) {
        const src = levelMap[level].questions;
        // 深拷贝简单数组
        levelQuestions = [...src];
        currentQuestionsSnapshot = levelQuestions;
    }

    // 切换关卡
    function switchLevel(levelId) {
        currentLevel = levelId;
        currentQuestionIndex = 0;
        answered = false;
        selectedOptionIdx = null;
        levelCompletedFlag = false;
        loadLevelQuestions(currentLevel);
        // 不重置积分但切换关卡后保留积分继续 (体验友好)
        feedbackDiv.innerHTML = `✨ 进入 ${levelMap[currentLevel].name} ，答对一题+10分，完成额外奖励${levelMap[currentLevel].bonus}分！ ✨`;
        feedbackDiv.className = "feedback correct-feedback";
        renderCurrentQuestion();
        nextBtn.innerText = "🐬 下一题 🐬";
        // 高亮按钮样式
        levelBtns.forEach(btn => {
            if (btn.dataset.level === levelId) {
                btn.classList.add("active");
            } else {
                btn.classList.remove("active");
            }
        });
    }

    // 重置积分和所有进度，回到当前关卡开头
    function fullReset() {
        score = 0;
        updateScoreUI();
        currentQuestionIndex = 0;
        answered = false;
        selectedOptionIdx = null;
        levelCompletedFlag = false;
        loadLevelQuestions(currentLevel);
        feedbackDiv.innerHTML = "🐙 积分已归零，重新开始冒险！加油小鱼儿～ 🐙";
        feedbackDiv.className = "feedback correct-feedback";
        renderCurrentQuestion();
        nextBtn.innerText = "🐬 下一题 🐬";
    }

    // 事件绑定
    nextBtn.addEventListener("click", () => {
        if (!levelCompletedFlag && (currentQuestionIndex >= levelQuestions.length)) {
            // 实际上已经完成但没有flag? 调用渲染一次完成逻辑
            if (!levelCompletedFlag) {
                const bonus = levelMap[currentLevel].bonus;
                score += bonus;
                updateScoreUI();
                levelCompletedFlag = true;
                feedbackDiv.innerHTML = `🎉✨ 完成${levelMap[currentLevel].name}！获得额外 ${bonus} 分！ ✨🎉`;
                feedbackDiv.className = "feedback correct-feedback";
                renderCurrentQuestion(); // 刷新完成界面
                nextBtn.innerText = "🐚 切换关卡 🐚";
            } else {
                // 提示切换关卡
                feedbackDiv.innerHTML = "🏝️ 已完成该海域，请点击上方其他关卡继续挑战！🏝️";
                feedbackDiv.className = "feedback wrong-feedback";
            }
            return;
        }
        if (!answered && currentQuestionIndex < levelQuestions.length) {
            feedbackDiv.innerHTML = "🐢 还没有作答哟，选择一个答案吧！🐢";
            feedbackDiv.className = "feedback wrong-feedback";
            return;
        }
        loadNextQuestion();
    });

    resetBtn.addEventListener("click", () => {
        fullReset();
    });

    levelBtns.forEach(btn => {
        btn.addEventListener("click", (e) => {
            const levelId = btn.dataset.level;
            if (levelId === currentLevel) {
                // 同关卡可以重置进度但不重置积分 (方便重新挑战)
                if (confirm("是否重置当前关卡的答题进度？积分保持不变。")) {
                    currentQuestionIndex = 0;
                    answered = false;
                    selectedOptionIdx = null;
                    levelCompletedFlag = false;
                    loadLevelQuestions(currentLevel);
                    feedbackDiv.innerHTML = "🔄 进度已重置，重新开始本关卡～";
                    feedbackDiv.className = "feedback correct-feedback";
                    renderCurrentQuestion();
                    nextBtn.innerText = "🐬 下一题 🐬";
                }
                return;
            }
            switchLevel(levelId);
        });
    });

    // 初始化加载基础关卡
    function init() {
        currentLevel = "basic";
        loadLevelQuestions("basic");
        currentQuestionIndex = 0;
        answered = false;
        score = 0;
        levelCompletedFlag = false;
        updateScoreUI();
        renderCurrentQuestion();
        document.querySelector(".level-btn[data-level='basic']").classList.add("active");
        feedbackDiv.innerHTML = "🐠 欢迎来到海洋数学岛！每答对+10分，完成关卡得额外奖励～ 🐠";
        nextBtn.innerText = "🐬 下一题 🐬";
    }
    init();

    // 动态生成气泡背景
    function createBubbles() {
        for (let i = 0; i < 35; i++) {
            const bubble = document.createElement("div");
            bubble.classList.add("bubble");
            const size = Math.random() * 60 + 15;
            bubble.style.width = `${size}px`;
            bubble.style.height = `${size}px`;
            bubble.style.left = `${Math.random() * 100}%`;
            bubble.style.animationDelay = `${Math.random() * 12}s`;
            bubble.style.animationDuration = `${Math.random() * 6 + 5}s`;
            document.body.appendChild(bubble);
        }
    }
    createBubbles();
</script>
</body>
</html>
